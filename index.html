<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>플립북 이미지 뷰어</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1a1e26;
      --line: #303746;
      --text: #f5f7fb;
      --muted: #a9b1c2;
      --accent: #ff6a2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #202633, var(--bg) 56%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      width: min(980px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(26, 30, 38, .96);
      box-shadow: 0 24px 70px rgba(0,0,0,.35);
    }
    header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 20px; }
    .hint { color: var(--muted); font-size: 13px; }
    main { padding: 20px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    button, .file-label, input, select { font: inherit; }
    button, .file-label, select {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 15px;
      background: #252b36;
      color: var(--text);
      cursor: pointer;
      transition: .15s ease;
      user-select: none;
    }
    button:hover, .file-label:hover, select:hover { transform: translateY(-1px); border-color: #566176; }
    button.primary {
      min-width: 112px;
      border-color: transparent;
      background: linear-gradient(135deg, #ff7a31, #e94b23);
      font-weight: 750;
    }
    button.secondary {
      background: linear-gradient(135deg, #3f8cff, #2a63ff);
      border-color: transparent;
      font-weight: 700;
    }
    button:disabled, .file-label.disabled, select:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }
    input[type="file"] { display: none; }
    .field {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      background: #151922;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px 10px;
    }
    .field.disabled { opacity: .45; }
    .field input[type="number"] {
      width: 54px;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      text-align: center;
    }
    .field input[type="range"] { width: 110px; accent-color: var(--accent); }
    .field select {
      padding: 6px 8px;
      min-width: 82px;
      background: #151922;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .field select option {
      background: #ffffff;
      color: #111111;
    }
    .viewer {
      position: relative;
      min-height: 520px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px dashed #3e4657;
      border-radius: 16px;
      background:
        linear-gradient(45deg, #161a21 25%, transparent 25%),
        linear-gradient(-45deg, #161a21 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #161a21 75%),
        linear-gradient(-45deg, transparent 75%, #161a21 75%),
        #101318;
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
    }
    .viewer.dragover { outline: 3px solid rgba(255,106,42,.55); outline-offset: -4px; }
    canvas {
      display: block;
      max-width: 92%;
      max-height: 68vh;
      image-rendering: auto;
      filter: drop-shadow(0 14px 28px rgba(0,0,0,.42));
    }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
      color: var(--muted);
      pointer-events: none;
    }
    .empty[hidden] { display: none; }
    .empty strong { display: block; margin-bottom: 8px; color: var(--text); font-size: 18px; }
    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 12px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    @media (max-width: 640px) {
      body { padding: 10px; }
      main { padding: 12px; }
      .viewer { min-height: 400px; }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <section class="app">
    <header>
      <h1>플립북 이미지 뷰어</h1>
      <div id="headerHint" class="hint">스프라이트 시트 기본값: 4열 × 4행 · 16 FPS</div>
    </header>

    <main>
      <div class="toolbar">
        <label class="file-label" for="fileInput">이미지 첨부</label>
        <input id="fileInput" type="file" accept="image/*" />

        <label class="file-label" for="multiInput">여러 이미지 선택</label>
        <input id="multiInput" type="file" accept="image/*" multiple />

        <button id="playBtn" class="primary" type="button" disabled>▶ 시작</button>

        <label id="colsField" class="field">열
          <input id="cols" type="number" min="1" max="64" value="4" />
        </label>
        <label id="rowsField" class="field">행
          <input id="rows" type="number" min="1" max="64" value="4" />
        </label>
        <label class="field">속도
          <input id="fps" type="range" min="1" max="30" value="16" />
          <span id="fpsText">16 FPS</span>
        </label>

        <label id="sheetSizeField" class="field">저장 시트
          <select id="sheetSize" disabled>
            <option value="2">2 × 2</option>
            <option value="3">3 × 3</option>
            <option value="4" selected>4 × 4</option>
            <option value="5">5 × 5</option>
            <option value="6">6 × 6</option>
            <option value="7">7 × 7</option>
            <option value="8">8 × 8</option>
          </select>
        </label>

        <button id="saveBtn" class="secondary" type="button" disabled>시트 저장</button>
      </div>

      <div id="viewer" class="viewer">
        <canvas id="canvas"></canvas>
        <div id="empty" class="empty">
          <div><strong>이미지를 끌어놓거나 첨부하세요</strong>스프라이트 시트 한 장 또는 여러 이미지 파일을 선택할 수 있습니다.</div>
        </div>
      </div>

      <div class="status">
        <span id="fileStatus">선택된 이미지 없음</span>
        <span id="frameStatus">프레임 0 / 0</span>
      </div>
    </main>
  </section>

  <script>
    (() => {
      'use strict';

      const fileInput = document.getElementById('fileInput');
      const multiInput = document.getElementById('multiInput');
      const playBtn = document.getElementById('playBtn');
      const colsInput = document.getElementById('cols');
      const rowsInput = document.getElementById('rows');
      const colsField = document.getElementById('colsField');
      const rowsField = document.getElementById('rowsField');
      const fpsInput = document.getElementById('fps');
      const fpsText = document.getElementById('fpsText');
      const sheetSizeField = document.getElementById('sheetSizeField');
      const sheetSizeSelect = document.getElementById('sheetSize');
      const saveBtn = document.getElementById('saveBtn');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const viewer = document.getElementById('viewer');
      const empty = document.getElementById('empty');
      const fileStatus = document.getElementById('fileStatus');
      const frameStatus = document.getElementById('frameStatus');
      const headerHint = document.getElementById('headerHint');

      let mode = 'sheet';
      let sheetImage = null;
      let sequence = [];
      let frame = 0;
      let playing = false;
      let timer = null;

      const naturalSort = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });

      const clampInt = (value, min, max, fallback) => {
        const n = Number.parseInt(value, 10);
        return Number.isFinite(n) ? Math.min(max, Math.max(min, n)) : fallback;
      };

      function grid() {
        const cols = clampInt(colsInput.value, 1, 64, 4);
        const rows = clampInt(rowsInput.value, 1, 64, 4);
        colsInput.value = cols;
        rowsInput.value = rows;
        return { cols, rows, total: cols * rows };
      }

      function totalFrames() {
        return mode === 'sequence' ? sequence.length : (sheetImage ? grid().total : 0);
      }

      function updateExportControls() {
        const enabled = mode === 'sequence' && sequence.length > 0;
        sheetSizeSelect.disabled = !enabled;
        saveBtn.disabled = !enabled;
        sheetSizeField.classList.toggle('disabled', !enabled);
      }

      function stop() {
        playing = false;
        playBtn.textContent = '▶ 시작';
        if (timer !== null) {
          clearInterval(timer);
          timer = null;
        }
      }

      function clearSequence() {
        sequence.forEach(item => URL.revokeObjectURL(item.url));
        sequence = [];
        updateExportControls();
      }

      function clearSheet() {
        if (sheetImage?.dataset?.url) URL.revokeObjectURL(sheetImage.dataset.url);
        sheetImage = null;
      }

      function setMode(nextMode) {
        mode = nextMode;
        const sequenceMode = mode === 'sequence';
        colsInput.disabled = sequenceMode;
        rowsInput.disabled = sequenceMode;
        colsField.classList.toggle('disabled', sequenceMode);
        rowsField.classList.toggle('disabled', sequenceMode);
        headerHint.textContent = sequenceMode
          ? '여러 이미지 파일명 순서 재생 · 저장 시 2×2 ~ 8×8 스프라이트 시트 지원 · 기본 16 FPS'
          : '스프라이트 시트 기본값: 4열 × 4행 · 16 FPS';
        updateExportControls();
      }

      function fitCanvas(width, height) {
        const maxSide = 760;
        const scale = Math.min(1, maxSide / Math.max(width, height));
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));
      }

      function drawSheetFrame() {
        if (!sheetImage) return;
        const { cols, rows, total } = grid();
        frame = ((frame % total) + total) % total;

        const sourceW = sheetImage.naturalWidth / cols;
        const sourceH = sheetImage.naturalHeight / rows;
        const col = frame % cols;
        const row = Math.floor(frame / cols);

        fitCanvas(sourceW, sourceH);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(
          sheetImage,
          col * sourceW, row * sourceH, sourceW, sourceH,
          0, 0, canvas.width, canvas.height
        );
        frameStatus.textContent = `프레임 ${frame + 1} / ${total}`;
      }

      function drawSequenceFrame() {
        if (!sequence.length) return;
        frame = ((frame % sequence.length) + sequence.length) % sequence.length;
        const item = sequence[frame];
        const img = item.image;

        fitCanvas(img.naturalWidth, img.naturalHeight);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        frameStatus.textContent = `이미지 ${frame + 1} / ${sequence.length}`;
        fileStatus.textContent = `${item.name} · ${img.naturalWidth}×${img.naturalHeight}`;
      }

      function drawFrame() {
        if (mode === 'sequence') drawSequenceFrame();
        else drawSheetFrame();
      }

      function start() {
        if (!totalFrames()) return;
        stop();
        playing = true;
        playBtn.textContent = '⏸ 멈춤';
        const fps = clampInt(fpsInput.value, 1, 30, 16);
        timer = window.setInterval(() => {
          frame = (frame + 1) % totalFrames();
          drawFrame();
        }, 1000 / fps);
      }

      function togglePlay() {
        if (playing) stop();
        else start();
      }

      function loadSheet(file) {
        if (!file || !file.type.startsWith('image/')) {
          alert('이미지 파일을 선택해 주세요.');
          return;
        }

        stop();
        clearSequence();
        clearSheet();
        setMode('sheet');

        const objectUrl = URL.createObjectURL(file);
        const nextImage = new Image();
        nextImage.onload = () => {
          nextImage.dataset.url = objectUrl;
          sheetImage = nextImage;
          frame = 0;
          empty.hidden = true;
          playBtn.disabled = false;
          fileStatus.textContent = `${file.name} · ${sheetImage.naturalWidth}×${sheetImage.naturalHeight}`;
          drawFrame();
        };
        nextImage.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          alert('이미지를 불러오지 못했습니다.');
        };
        nextImage.src = objectUrl;
      }

      async function loadSequence(fileList) {
        const files = Array.from(fileList)
          .filter(file => file.type.startsWith('image/'))
          .sort((a, b) => naturalSort.compare(a.name, b.name));

        if (!files.length) {
          alert('선택한 파일 중 이미지가 없습니다.');
          return;
        }

        stop();
        clearSequence();
        clearSheet();
        setMode('sequence');
        frame = 0;
        playBtn.disabled = true;
        fileStatus.textContent = `이미지 ${files.length}개 불러오는 중...`;

        try {
          const loaded = await Promise.all(files.map(file => new Promise((resolve, reject) => {
            const url = URL.createObjectURL(file);
            const image = new Image();
            image.onload = () => resolve({
              name: file.name,
              url,
              image
            });
            image.onerror = () => {
              URL.revokeObjectURL(url);
              reject(new Error(file.name));
            };
            image.src = url;
          })));

          sequence = loaded;
          empty.hidden = true;
          playBtn.disabled = false;
          updateExportControls();
          fileStatus.textContent = `다중 이미지 ${sequence.length}개 · 파일명 순서`;
          drawFrame();
        } catch (error) {
          clearSequence();
          playBtn.disabled = true;
          alert(`이미지를 불러오지 못했습니다: ${error.message}`);
        }
      }

      function blobFromCanvas(offscreen) {
        return new Promise((resolve, reject) => {
          offscreen.toBlob(blob => {
            if (blob) resolve(blob);
            else reject(new Error('시트 이미지를 생성하지 못했습니다.'));
          }, 'image/png');
        });
      }

      function triggerDownload(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function baseFileName(name) {
        return (name || 'sprite_sheet').replace(/\.[^.]+$/, '');
      }

      async function saveSpriteSheet() {
        if (mode !== 'sequence' || !sequence.length) {
          alert('여러 이미지를 먼저 선택해 주세요.');
          return;
        }

        const gridSize = clampInt(sheetSizeSelect.value, 2, 8, 4);
        const capacity = gridSize * gridSize;
        const total = sequence.length;
        const pageCount = Math.ceil(total / capacity);
        const cellWidth = Math.max(...sequence.map(item => item.image.naturalWidth));
        const cellHeight = Math.max(...sequence.map(item => item.image.naturalHeight));
        const baseName = baseFileName(sequence[0]?.name || 'sprite_sheet');

        saveBtn.disabled = true;
        saveBtn.textContent = '저장 중...';

        try {
          for (let page = 0; page < pageCount; page += 1) {
            const offscreen = document.createElement('canvas');
            offscreen.width = cellWidth * gridSize;
            offscreen.height = cellHeight * gridSize;
            const offCtx = offscreen.getContext('2d');
            offCtx.clearRect(0, 0, offscreen.width, offscreen.height);

            for (let i = 0; i < capacity; i += 1) {
              const index = page * capacity + i;
              if (index >= total) break;
              const item = sequence[index];
              const img = item.image;
              const col = i % gridSize;
              const row = Math.floor(i / gridSize);
              const x = col * cellWidth + Math.floor((cellWidth - img.naturalWidth) / 2);
              const y = row * cellHeight + Math.floor((cellHeight - img.naturalHeight) / 2);
              offCtx.drawImage(img, x, y, img.naturalWidth, img.naturalHeight);
            }

            const blob = await blobFromCanvas(offscreen);
            const fileName = pageCount === 1
              ? `${baseName}_${gridSize}x${gridSize}.png`
              : `${baseName}_${gridSize}x${gridSize}_${String(page + 1).padStart(2, '0')}.png`;
            triggerDownload(blob, fileName);

            await new Promise(resolve => setTimeout(resolve, 180));
          }

          alert(pageCount === 1
            ? `${gridSize}x${gridSize} 스프라이트 시트 저장이 완료되었습니다.`
            : `${gridSize}x${gridSize} 스프라이트 시트 ${pageCount}장이 저장되었습니다.`);
        } catch (error) {
          alert(error.message || '저장 중 오류가 발생했습니다.');
        } finally {
          updateExportControls();
          saveBtn.textContent = '시트 저장';
        }
      }

      fileInput.addEventListener('change', event => {
        loadSheet(event.target.files[0]);
        event.target.value = '';
      });

      multiInput.addEventListener('change', event => {
        const files = Array.from(event.target.files || []);
        if (files.length === 1) loadSheet(files[0]);
        else loadSequence(files);
        event.target.value = '';
      });

      playBtn.addEventListener('click', togglePlay);
      saveBtn.addEventListener('click', saveSpriteSheet);

      [colsInput, rowsInput].forEach(input => {
        input.addEventListener('change', () => {
          if (mode !== 'sheet') return;
          stop();
          frame = 0;
          drawFrame();
        });
      });

      fpsInput.addEventListener('input', () => {
        fpsText.textContent = `${fpsInput.value} FPS`;
        if (playing) start();
      });

      ['dragenter', 'dragover'].forEach(type => {
        viewer.addEventListener(type, event => {
          event.preventDefault();
          viewer.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach(type => {
        viewer.addEventListener(type, event => {
          event.preventDefault();
          viewer.classList.remove('dragover');
        });
      });

      viewer.addEventListener('drop', event => {
        const files = Array.from(event.dataTransfer.files).filter(file => file.type.startsWith('image/'));
        if (files.length > 1) loadSequence(files);
        else if (files.length === 1) loadSheet(files[0]);
        else alert('이미지 파일을 끌어놓아 주세요.');
      });

      window.addEventListener('keydown', event => {
        if (event.code === 'Space' && totalFrames() && event.target.tagName !== 'INPUT' && event.target.tagName !== 'SELECT') {
          event.preventDefault();
          togglePlay();
        }
      });

      window.addEventListener('beforeunload', () => {
        clearSequence();
        clearSheet();
      });
    })();
  </script>
</body>
</html>
